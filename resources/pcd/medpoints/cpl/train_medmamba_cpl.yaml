mode: train
model:
  name: AE
  encoder:
    name: MedMamba
    in_channel: 3
    out_channel: 3
    point_num: 2048
    building_block: lg_ssm
    num_neighbors_k: 32
    num_fps_points: [1024, 512, 256, 128]
    fps_feature_channels: [64, 128, 256, 512]
    neighbor_radius: [0.1, 0.2, 0.4, 0.8]
    fp_channels: [512, 256, 128, 64]
    dense_channels: [1024]
    activation: lrelu
    normalization: group
    long_range_modeling: True
    scan_strategies: [{name: mds, use_feat: true, hidden_dim: 64, alpha: 0.2, num_scales: 3}]
    sorted_query: True
    flip_scan: False
    pos_embedding: True
    vector_embedding: True
    knn_query: xyz
    final_concat: True
    channel_attention: eca
    use_rpe: True
    use_multiscale_scan: True
    multiscale_k: [8, 16, 32]
    use_nc_spi: True
    nc_spi_num_prompts: 16
    nc_spi_rank: 48
    nc_spi_temperature: 1.0
  decoder:
    name: PointNet
    building_block: dense
    folding_times: 2
  is_supervised: True
  condition_embedding:
    combine_condition: injection
    condition_injection: gate_bias
    encoder:
      name: OneHot
      type: categories
      out_channel: 128
      num_classes: 46
    decoder: same_as_encoder
  reconstruction_losses: 
    - name: DCD
      alpha: 40
      n_lambda: 0.5
    - name: CD
      weight: 0.001
loader:
  dataset: 
    name: PcdReconWithClassLabelDataset
    data_dir: partial
    target_dir: target
    data_suffix: .ply
    target_suffix: .ply
    cls_label: MedPointS

  data_path_list: 
    - /home/zhaosong/PointCloud/flemme-main/data/MedPointS/completion/fold1
    - /home/zhaosong/PointCloud/flemme-main/data/MedPointS/completion/fold2
    - /home/zhaosong/PointCloud/flemme-main/data/MedPointS/completion/fold3
  batch_size: 2
  num_workers: 8
  shuffle: true
  data_transforms:
    - name: Normalize
      method: mean
    - name: FixedPoints
      num: 2048
    - name: ToTensor
  target_transforms:
    - name: Normalize
      method: mean
    - name: FixedPoints
      num: 2048
    - name: ToTensor
  class_label_transforms:
    - name: Relabel
      offset: -1
    - name: ToOneHot
      num_classes: 46
    - name: ToTensor
val_loader:
  dataset: 
    name: PcdReconWithClassLabelDataset
    data_dir: partial
    target_dir: target
    data_suffix: .ply
    target_suffix: .ply
    cls_label: MedPointS
  data_path_list: 
    - /home/zhaosong/PointCloud/flemme-main/data/MedPointS/completion/fold4
  batch_size: 8
  num_workers: 8
  shuffle: true
  data_transforms:
    - name: Normalize
      method: mean
    - name: FixedPoints
      num: 2048
    - name: ToTensor
  target_transforms:
    - name: Normalize
      method: mean
    - name: FixedPoints
      num: 2048
    - name: ToTensor
  class_label_transforms:
    - name: Relabel
      offset: -1
    - name: ToOneHot
      num_classes: 46
    - name: ToTensor
check_point_dir: outputs/MedMamba_CPL
resume: False
optimizer:
  name: Adam
  lr: 0.0001
  weight_decay: 0.00000001
evaluation_metrics:
  recon:
    - name: CD
score_metric:
  name: CD
  higher_is_better: false
lr_scheduler: 
  name: LinearLR
  start_factor: 1.0
  end_factor: 0.01
max_epoch: 200
write_after_iters: 20
save_after_epochs: 2
